# systemd-tmpfiles entry: create the directory that holds the per-slot unix
# sockets. Install as /etc/tmpfiles.d/webterm.conf so it is recreated on boot.
#
#   sudo cp deploy/webterm.tmpfiles.conf /etc/tmpfiles.d/webterm.conf
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/webterm.conf
#
# Mode 0755 lets nginx traverse into the directory; the socket files themselves
# are gated by SocketUser/SocketGroup/SocketMode in webterm@.socket.
d /run/webterm 0755 root root -
