<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Webterm</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="terminal">
      <div id="terminal-fit"></div>
    </div>

    <nav id="mobile-keys" class="mobile-keys" aria-label="Virtual terminal keys">
      <button type="button" data-keyboard aria-label="Show keyboard">⌨️</button>
      <button type="button" data-input="tab">Tab</button>
      <button type="button" data-input="esc">Esc</button>
      <button type="button" data-input="ctrl-c">^C</button>
      <button type="button" data-input="ctrl-d">^D</button>
      <button type="button" data-input="left">←</button>
      <button type="button" data-input="down">↓</button>
      <button type="button" data-input="up">↑</button>
      <button type="button" data-input="right">→</button>
      <button type="button" data-input="page-up">PgUp</button>
      <button type="button" data-input="page-down">PgDn</button>
      <button type="button" data-input="home">Home</button>
      <button type="button" data-input="end">End</button>
    </nav>

    <div id="status" class="status hidden"></div>

    <div id="overlay" class="overlay hidden">
      <div class="card">
        <button
          type="button"
          id="overlay-dismiss"
          class="overlay-dismiss hidden"
          aria-label="Dismiss"
        >
          ×
        </button>
        <h2 id="overlay-title">Disconnected</h2>
        <div id="overlay-body" class="overlay-body"></div>
        <div id="overlay-actions" class="actions"></div>
      </div>
    </div>

    <script src="vendor/xterm.js" defer></script>
    <script src="vendor/addon-fit.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
