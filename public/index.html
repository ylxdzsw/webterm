<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Webterm</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preload" href="fonts/SarasaTermSC-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/SarasaTermSC-Bold.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="terminal"></div>

    <div id="status" class="status hidden"></div>

    <div id="overlay" class="overlay hidden">
      <div class="card">
        <button
          type="button"
          id="overlay-dismiss"
          class="overlay-dismiss hidden"
          aria-label="Dismiss"
        >
          ×
        </button>
        <h2 id="overlay-title">Disconnected</h2>
        <div id="overlay-body" class="overlay-body"></div>
        <div id="overlay-actions" class="actions"></div>
      </div>
    </div>

    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="app.js"></script>
  </body>
</html>
