name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  browser:
    name: browser tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: smoke
        run: bash scripts/ci-browser.sh smoke
        if: always()
      - name: nag
        run: bash scripts/ci-browser.sh nag
        if: always()
      - name: nag-redirect
        run: bash scripts/ci-browser.sh nag-redirect
        if: always()
      - name: reconnect-fail
        run: bash scripts/ci-browser.sh reconnect-fail
        if: always()
      - name: reconnect-scroll
        run: bash scripts/ci-browser.sh reconnect-scroll
        if: always()
      - name: exit
        run: bash scripts/ci-browser.sh exit
        if: always()
